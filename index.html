    <!-- Global Error Shield -->
    <script>
      // Global error handler to gracefully silence generic "Script error." caused by cross-origin trackers or extensions
      window.onerror = function(message, source, lineno, colno, error) {
        var msg = message ? String(message) : '';
        var src = source ? String(source) : '';
        if (msg === 'Script error.' || msg.indexOf('Script error') !== -1 || msg.indexOf('script error') !== -1 || !src) {
          console.warn("[Intercepted] Bypassed generic cross-origin Script error.");
          return true; // Prevents the firing of the default event handler
        }
        return false;
      };

      // In some environments, the listener needs to catch the error in capture phase and stop immediate propagation
      window.addEventListener('error', function(e) {
        if (!e) return;
        
        // Handle element resource load failures (like failed script or stylesheet tags)
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK' || e.target.tagName === 'IFRAME')) {
          console.warn("[Intercepted Load Error] Bypassed resource load error for target:", e.target.tagName, e.target.src || e.target.href);
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          return true;
        }

        const msg = e.message ? String(e.message) : '';
        if (msg === 'Script error.' || msg.indexOf('Script error') !== -1 || msg.indexOf('script error') !== -1) {
          console.warn("[Intercepted Event] Prevented propagation of generic cross-origin Script error.");
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          return true;
        }
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        if (!e) return;
        const reason = e.reason && e.reason.message ? String(e.reason.message) : '';
        if (reason === 'Script error.' || reason.indexOf('Script error') !== -1 || reason.indexOf('script error') !== -1) {
          console.warn("[Intercepted Rejection] Prevented propagation of generic cross-origin promise rejection.");
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          return true;
        }
      }, true);
    </script>
